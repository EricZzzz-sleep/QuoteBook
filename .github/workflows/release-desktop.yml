name: Build desktop installers

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm install
      - run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-mac
          path: dist/QuoteBook-mac.dmg

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm install
      - run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-windows
          path: dist/QuoteBook-windows.exe

  publish-release:
    name: Publish installer downloads
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Attach installers to published release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            release-assets/QuoteBook-mac/QuoteBook-mac.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --clobber
      - name: Create latest download release
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            release-assets/QuoteBook-mac/QuoteBook-mac.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --title "QuoteBook Latest" \
            --notes "Latest unsigned QuoteBook desktop installers for macOS and Windows." \
            --target "$GITHUB_SHA" \
            --latest
