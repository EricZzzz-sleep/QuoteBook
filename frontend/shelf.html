<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelf | QuoteBook</title>
  <meta name="theme-color" content="#2f7d7a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="shelf">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>QuoteBook</strong>
          <span>Personal notes</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Notebook sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item active" href="shelf.html" aria-current="page">Shelf</a>
        <a class="nav-item" href="notes.html">Notes</a>
      </nav>

    </aside>

    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Library shelf</p>
          <h1>Keep books and notes together.</h1>
        </div>
        <button class="primary-action" type="button" data-upload-pdf>Upload PDF</button>
      </header>

      <section class="shelf-toolbar" aria-label="Shelf tools">
        <label class="shelf-search-label">
          <span>Search</span>
          <input class="field-input" type="search" placeholder="Find books" autocomplete="off" data-shelf-search>
        </label>
        <label class="shelf-sort-label">
          <span>Sort</span>
          <select class="field-input" data-shelf-sort>
            <option value="recent">Recently read</option>
            <option value="title">Title</option>
            <option value="quotes">Most quotes</option>
          </select>
        </label>
      </section>

      <section class="shelf-grid" aria-label="Book shelf" data-book-grid>
        <div class="empty-library">
          <strong>Loading shelf...</strong>
          <p>Fetching your uploaded PDFs.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
