<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader | Reading Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reader">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <span class="brand-mark">RT</span>
        <div>
          <strong>Reading Tracker</strong>
          <span>Personal library</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Reading sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item active" href="shelf.html" aria-current="page">Shelf</a>
        <a class="nav-item" href="notes.html">Notes</a>
        <a class="nav-item" href="vocabulary.html">Vocabulary</a>
      </nav>

      <div class="sidebar-panel">
        <span class="panel-label">Reading now</span>
        <strong id="readerSidebarTitle">PDF book</strong>
        <p id="readerSidebarMeta">Loading saved progress.</p>
      </div>
    </aside>

    <main class="page reader-page">
      <header class="topbar reader-topbar">
        <div>
          <p class="eyebrow">PDF reader</p>
          <h1 id="readerTitle">Opening book...</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-action" id="readerRename" type="button">Rename</button>
          <a class="ghost-action link-action" href="shelf.html">Back to Shelf</a>
        </div>
      </header>

      <section class="reader-shell" aria-label="PDF reader">
        <div class="reader-toolbar">
          <button class="ghost-action" id="prevPage" type="button">Previous</button>
          <div class="reader-status">
            <strong id="pageStatus">Page - of -</strong>
            <span id="progressStatus">0% complete</span>
          </div>
          <button class="ghost-action" id="nextPage" type="button">Next</button>
        </div>

        <div class="reader-progress" aria-hidden="true">
          <span id="readerProgressBar"></span>
        </div>

        <div class="pdf-stage">
          <canvas id="pdfCanvas"></canvas>
          <p class="empty-state" id="readerMessage">Loading PDF...</p>
        </div>
      </section>

      <section class="capture-panel" aria-label="Reading captures">
        <form class="capture-card" data-note-form>
          <div>
            <p class="eyebrow">Quote note</p>
            <h2>Save a passage</h2>
          </div>
          <label class="field-label">
            <span>Quote</span>
            <textarea class="field-input text-area" name="quote" rows="4" placeholder="Paste or type the quote from this page." required></textarea>
          </label>
          <label class="field-label">
            <span>Side note</span>
            <textarea class="field-input text-area" name="note" rows="3" placeholder="Why does it matter?"></textarea>
          </label>
          <button class="primary-action" type="submit">Save Note</button>
        </form>

        <form class="capture-card" data-vocabulary-form>
          <div>
            <p class="eyebrow">Vocabulary</p>
            <h2>Mark a word</h2>
          </div>
          <label class="field-label">
            <span>Word</span>
            <input class="field-input" name="word" type="text" maxlength="80" required>
          </label>
          <label class="field-label">
            <span>Translation</span>
            <input class="field-input" name="translation" type="text" maxlength="160" placeholder="Meaning or translation" required>
          </label>
          <button class="primary-action" type="submit">Save Word</button>
        </form>

        <form class="capture-card capture-card-wide" data-summary-form>
          <div>
            <p class="eyebrow">Summary</p>
            <h2>Write a summary</h2>
          </div>
          <label class="field-label">
            <span>Summary</span>
            <textarea class="field-input text-area" name="summary" rows="5" placeholder="Capture the main idea from this reading session." required></textarea>
          </label>
          <button class="primary-action" type="submit">Save Summary</button>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
