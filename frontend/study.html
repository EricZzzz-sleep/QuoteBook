<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study | QuoteBook</title>
  <meta name="theme-color" content="#2f7d7a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="study">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>QuoteBook</strong>
          <span>Reading memory</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Notebook sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item" href="shelf.html">Shelf</a>
        <a class="nav-item" href="notes.html">Notes</a>
        <a class="nav-item active" href="study.html" aria-current="page">Study</a>
      </nav>
    </aside>

    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Reading dashboard</p>
          <h1>Study</h1>
          <p class="page-subtitle">Plan today's reading and see your recent rhythm.</p>
        </div>
        <div class="topbar-actions">
          <button class="primary-action" type="button" data-upload-pdf>Upload PDF</button>
        </div>
      </header>

      <section class="study-layout">
        <section class="study-panel study-today-panel" aria-label="Today's reading plan" data-study-goal></section>
        <section class="study-panel study-activity-panel" aria-label="Reading time this week" data-study-activity></section>
        <section class="study-panel study-book-panel" aria-label="Book pace" data-study-book-panel>
          <div class="section-header compact">
            <div>
              <p class="eyebrow">Books</p>
              <h2>Book pace</h2>
            </div>
          </div>
          <div class="study-book-list" data-study-book-goals></div>
        </section>
      </section>
    </main>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
