<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | QuoteBook</title>
  <meta name="theme-color" content="#2f7d7a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/app-icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="notes">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>QuoteBook</strong>
          <span>Reading memory</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Notebook sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item" href="shelf.html">Shelf</a>
        <a class="nav-item active" href="notes.html" aria-current="page">Notes</a>
        <a class="nav-item" href="study.html">Study</a>
      </nav>

    </aside>

    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Notes workspace</p>
          <h1>Search the keywords inside your quotes.</h1>
        </div>
        <button class="primary-action" type="button" data-upload-pdf>Upload PDF</button>
      </header>

      <section class="notes-layout">
        <section class="keyword-workspace" aria-label="Cross-book quote search">
          <div class="section-header compact">
            <div>
              <p class="eyebrow">Keyword notebook</p>
              <h2>Find quotes across every PDF</h2>
            </div>
            <button class="ghost-action" type="button" data-export-keyword-brief hidden>Export Keyword Brief</button>
          </div>
          <label class="field-label quote-search-label">
            <span>Search quotes</span>
            <input class="field-input" type="search" placeholder="Search quote, side note, book, page, or keyword" data-notes-search>
          </label>
          <div class="keyword-filter-strip" data-top-keywords></div>
          <div class="keyword-brief" data-keyword-brief></div>
          <div class="global-quote-list" data-global-quotes></div>
        </section>

        <section class="notes-books-section" aria-label="Books with saved quotes">
          <div class="section-header compact">
            <div>
              <p class="eyebrow">Books</p>
              <h2>Open one book's quotes</h2>
            </div>
          </div>
          <div class="notes-column" data-real-notes></div>
        </section>
      </section>
    </main>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
